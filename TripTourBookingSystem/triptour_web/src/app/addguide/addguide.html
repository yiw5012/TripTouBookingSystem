<div class="add-guide-container">
  <div class="card">
    <div class="card-header">
      <h3>👷 เพิ่มข้อมูลบัญชีไกด์ (Admin)</h3>
      <p *ngIf="!isSubmitting">ข้อมูลจะถูกส่งไปยัง Firebase Auth และฐานข้อมูลระบบ</p>
      <p *ngIf="isSubmitting" class="text-warning">⌛ กำลังส่งข้อมูลไปยังเซิร์ฟเวอร์...</p>
    </div>
    
    <div class="card-body">
      <form [formGroup]="guideForm" (ngSubmit)="onSubmit()">
        
        <h5 class="section-title">🔐 ข้อมูลบัญชี (Login Info)</h5>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label>อีเมล (Email) *</label>
            <input type="email" formControlName="email" class="form-control" placeholder="example@mail.com">
            <small class="text-danger" *ngIf="guideForm.get('email')?.errors?.['required'] && guideForm.get('email')?.touched">
              จำเป็นต้องระบุอีเมล
            </small>
            <small class="text-danger" *ngIf="guideForm.get('email')?.errors?.['email'] && guideForm.get('email')?.touched">
              รูปแบบอีเมลไม่ถูกต้อง
            </small>
          </div>
          <div class="col-md-6 mb-3">
            <label>รหัสผ่าน (Password) *</label>
            <input type="password" formControlName="password" class="form-control" placeholder="อย่างน้อย 6 ตัวอักษร">
            <small class="text-danger" *ngIf="guideForm.get('password')?.invalid && guideForm.get('password')?.touched">
              รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร
            </small>
          </div>
        </div>

        <hr>

        <h5 class="section-title">👤 ข้อมูลส่วนตัว (Personal Info)</h5>
        <div class="row">
          <div class="col-md-4 mb-3">
            <label>รหัสไกด์ (Guide Code) *</label>
            <input type="text" formControlName="guide_code" class="form-control" placeholder="G-001">
          </div>
          <div class="col-md-4 mb-3">
            <label>ชื่อ (First Name) *</label>
            <input type="text" formControlName="first_name" class="form-control">
          </div>
          <div class="col-md-4 mb-3">
            <label>นามสกุล (Last Name) *</label>
            <input type="text" formControlName="last_name" class="form-control">
          </div>
        </div>

        <div class="row">
          <div class="col-md-4 mb-3">
            <label>เบอร์โทรศัพท์ *</label>
            <input type="text" formControlName="phone" class="form-control" placeholder="08xxxxxxxx">
          </div>
          <div class="col-md-4 mb-3">
            <label>อายุ *</label>
            <input type="number" formControlName="age" class="form-control">
          </div>
          <div class="col-md-4 mb-3">
            <label>วันเกิด (Birthday) *</label>
            <input type="date" formControlName="birthday" class="form-control">
          </div>
        </div>

        <div class="mb-3">
          <label>ที่อยู่ (Address) *</label>
          <textarea formControlName="address" class="form-control" rows="3" placeholder="เลขที่บ้าน, ถนน, ตำบล, อำเภอ..."></textarea>
        </div>

        <div class="d-grid gap-2 mt-4">
          <button type="submit" class="btn btn-primary btn-lg" [disabled]="guideForm.invalid || isSubmitting">
            {{ isSubmitting ? '⌛ กำลังบันทึก...' : '🚀 บันทึกและสร้างบัญชีไกด์' }}
          </button>
          
          <button type="button" class="btn btn-light" (click)="guideForm.reset()" [disabled]="isSubmitting">
            ล้างข้อมูล
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
